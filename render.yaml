# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ai-decision-service
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Render sets PORT automatically; keep host binding open for the platform.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
